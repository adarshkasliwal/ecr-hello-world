name: Build & Push to AWS ECR + Deploy to App Runner

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 – Ensure the ECR repository exists
  # ─────────────────────────────────────────────────────────────
  create-ecr-repo:
    name: 🗃️ Create ECR Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create ECR repo (idempotent)
        run: |
          chmod +x scripts/create-ecr-repo.sh
          bash scripts/create-ecr-repo.sh

  # ─────────────────────────────────────────────────────────────
  # Job 2 – Build Docker image and push to ECR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: create-ecr-repo

    outputs:
      image_uri: ${{ steps.build-push.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to ECR
        id: build-push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_BASE="${REGISTRY}/${ECR_REPOSITORY}"
          SHORT_SHA="${IMAGE_TAG:0:7}"

          echo "Building image: ${IMAGE_BASE}:${SHORT_SHA}"

          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            --tag "${IMAGE_BASE}:${SHORT_SHA}" \
            --tag "${IMAGE_BASE}:${IMAGE_TAG}" \
            --push \
            .

          # Also tag :latest on pushes to main
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker buildx build \
              --platform linux/amd64 \
              --cache-from type=gha \
              --tag "${IMAGE_BASE}:latest" \
              --push \
              .
            echo "Tagged as :latest"
          fi

          IMAGE_URI="${IMAGE_BASE}:latest"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed: ${IMAGE_URI}"

      - name: Summary
        run: |
          echo "### 🐳 Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | \`${ECR_REPOSITORY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | \`${AWS_REGION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image URI | \`${{ steps.build-push.outputs.image_uri }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # Job 3 – Deploy to AWS App Runner (using AWS CLI)
  # ─────────────────────────────────────────────────────────────
  deploy-app-runner:
    name: 🚀 Deploy to App Runner
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to App Runner
        id: deploy
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          ACCESS_ROLE_ARN: ${{ secrets.APP_RUNNER_ROLE_ARN }}
        run: |
          SERVICE_NAME="ecr-hello-world"

          # Check if the App Runner service already exists
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${SERVICE_NAME}'].ServiceArn | [0]" \
            --output text 2>/dev/null || echo "None")

          if [[ "${SERVICE_ARN}" == "None" || -z "${SERVICE_ARN}" ]]; then
            echo "🚀 Creating new App Runner service: ${SERVICE_NAME}..."

            RESULT=$(aws apprunner create-service \
              --service-name "${SERVICE_NAME}" \
              --source-configuration "{
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"${ACCESS_ROLE_ARN}\"
                },
                \"AutoDeploymentsEnabled\": false,
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"${IMAGE_URI}\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"3000\"
                  }
                }
              }" \
              --instance-configuration "{
                \"Cpu\": \"1 vCPU\",
                \"Memory\": \"2 GB\"
              }" \
              --output json)

            SERVICE_ARN=$(echo "$RESULT" | jq -r '.Service.ServiceArn')
            SERVICE_URL=$(echo "$RESULT" | jq -r '.Service.ServiceUrl')
            echo "✅ Service created!"
          else
            echo "🔄 Updating existing App Runner service..."

            RESULT=$(aws apprunner update-service \
              --service-arn "${SERVICE_ARN}" \
              --source-configuration "{
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"${ACCESS_ROLE_ARN}\"
                },
                \"AutoDeploymentsEnabled\": false,
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"${IMAGE_URI}\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"3000\"
                  }
                }
              }" \
              --output json)

            SERVICE_URL=$(echo "$RESULT" | jq -r '.Service.ServiceUrl')
            echo "✅ Service updated!"
          fi

          echo "⏳ Waiting for service to become RUNNING (up to 5 min)..."
          aws apprunner wait service-running --service-arn "${SERVICE_ARN}" || true

          # Get final URL
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "${SERVICE_ARN}" \
            --query 'Service.ServiceUrl' \
            --output text)

          echo "service_url=${SERVICE_URL}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "🌐 =============================================="
          echo "🌐 LIVE URL: https://${SERVICE_URL}"
          echo "🌐 =============================================="

      - name: Summary
        run: |
          echo "### 🚀 App Runner Deployed!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌐 Live URL | [https://${{ steps.deploy.outputs.service_url }}](https://${{ steps.deploy.outputs.service_url }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | \`ecr-hello-world\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | \`${AWS_REGION}\` |" >> "$GITHUB_STEP_SUMMARY"
