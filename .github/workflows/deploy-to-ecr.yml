name: Build & Push to AWS ECR + Deploy to App Runner

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 – Ensure the ECR repository exists
  # ─────────────────────────────────────────────────────────────
  create-ecr-repo:
    name: 🗃️ Create ECR Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create ECR repo (idempotent)
        run: |
          chmod +x scripts/create-ecr-repo.sh
          bash scripts/create-ecr-repo.sh

  # ─────────────────────────────────────────────────────────────
  # Job 2 – Build Docker image and push to ECR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: create-ecr-repo

    outputs:
      image_uri: ${{ steps.build-push.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to ECR
        id: build-push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_BASE="${REGISTRY}/${ECR_REPOSITORY}"
          SHORT_SHA="${IMAGE_TAG:0:7}"

          echo "Building image: ${IMAGE_BASE}:${SHORT_SHA}"

          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            --tag "${IMAGE_BASE}:${SHORT_SHA}" \
            --tag "${IMAGE_BASE}:${IMAGE_TAG}" \
            --push \
            .

          # Also tag :latest on pushes to main
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker buildx build \
              --platform linux/amd64 \
              --cache-from type=gha \
              --tag "${IMAGE_BASE}:latest" \
              --push \
              .
            echo "Tagged as :latest"
          fi

          IMAGE_URI="${IMAGE_BASE}:latest"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed: ${IMAGE_URI}"

      - name: Summary
        run: |
          echo "### 🐳 Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | \`${ECR_REPOSITORY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | \`${AWS_REGION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image URI | \`${{ steps.build-push.outputs.image_uri }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # Job 3 – Deploy to AWS App Runner
  # ─────────────────────────────────────────────────────────────
  deploy-app-runner:
    name: 🚀 Deploy to App Runner
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to App Runner
        id: deploy
        uses: awslabs/amazon-app-runner-deploy@main
        with:
          service: ecr-hello-world
          image: ${{ needs.build-and-push.outputs.image_uri }}
          access-role-arn: ${{ secrets.APP_RUNNER_ROLE_ARN }}
          region: ${{ secrets.AWS_REGION }}
          cpu: 1
          memory: 2
          port: 3000
          wait-for-service-stability-seconds: 300

      - name: Print App Runner URL
        run: |
          echo "🌐 =============================================="
          echo "🌐 LIVE URL: https://${{ steps.deploy.outputs.service-url }}"
          echo "🌐 =============================================="

          echo "### 🚀 App Runner Deployed!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌐 Live URL | [https://${{ steps.deploy.outputs.service-url }}](https://${{ steps.deploy.outputs.service-url }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | \`ecr-hello-world\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | \`${AWS_REGION}\` |" >> "$GITHUB_STEP_SUMMARY"
